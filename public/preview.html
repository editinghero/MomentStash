<!DOCTYPE html>
<html>
<head>
    <title>Icon Preview</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; background: #888; }
        .row { display: flex; gap: 20px; align-items: center; }
        img { border: 1px solid #000; }
        h2 { color: white; }
        .transparent-bg {
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body>
    <h2>Light Mode</h2>
    <div class="row">
        <img src="logo-512.png" alt="Light 512">
        <img src="logo-192.png" alt="Light 192" class="transparent-bg">
    </div>
    <h2>Dark Mode</h2>
    <div class="row">
        <img src="logo-dark-512.png" alt="Dark 512">
        <img src="logo-dark-192.png" alt="Dark 192" class="transparent-bg">
    </div>
</body>
</html>
